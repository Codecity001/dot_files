styleConstants:
  - 'Glass=<WindhawkBlur BlurAmount="5" TintColor="{ThemeResource SystemChromeMediumColor}" TintOpacity="0.7" />'
  - 'Frosted=<WindhawkBlur BlurAmount="20" TintColor="{ThemeResource SystemChromeMediumColor}" TintOpacity="0.7" />'
  - 'Acrylic=<AcrylicBrush TintColor="{ThemeResource SystemChromeMediumColor}" TintOpacity="0" FallbackColor="{ThemeResource SystemChromeMediumColor}" />'
  - Background=$Glass
  - 'BorderBrush=<LinearGradientBrush StartPoint="0,0" EndPoint="0,1"><GradientStop Color="#50808080" Offset="0.0" /><GradientStop Color="#50404040" Offset="0.25" /><GradientStop Color="#50808080" Offset="1" /></LinearGradientBrush>'
  - 'BorderBrush2=<WindhawkBlur BlurAmount="10" TintColor="#909090" TintOpacity="0.3"/>'
  - 'ClockBG=<WindhawkBlur BlurAmount="15" TintColor="{ThemeResource SystemAccentColorLight2}" TintOpacity="0.3" />'
  - 'BorderThickness=0.3,1,0.3,1'
  - 'CornerRadius=25'
  - 'SearchBoxRadius=15'
  - 'ElementBG=<SolidColorBrush Color="{ThemeResource SystemChromeAltHighColor}" Opacity="0.3" />'
  - 'ElementBorderThickness=0.3,0.3,0.3,1'
  - 'ElementCornerRadius=20'
  - 'ElementBorderBrush=<LinearGradientBrush StartPoint="0,0" EndPoint="0,1"><GradientStop Color="#50808080" Offset="1" /><GradientStop Color="#50606060" Offset="0.15" /></LinearGradientBrush>'
  - 'ElementBorderBrush2=<WindhawkBlur BlurAmount="30" TintColor="#909090" TintOpacity="0.3"/>'

controlStyles:
  - target: Border#AcrylicOverlay
    styles:
      - Margin=0
      - BorderThickness=0
      - CornerRadius=10
      - Visibility=Collapsed
  - target: Border#AcrylicBorder
    styles:
      - Background:=$Background
      - CornerRadius=$CornerRadius
      - BorderThickness=$BorderThickness
      - BorderBrush:=$BorderBrush
  - target: StartMenu.SearchBoxToggleButton#SearchBoxToggleButton
    styles:
      - Visibility=Visible
      - Width=Auto
      - Height=50
      - RenderTransform:=<TranslateTransform X="0" Y="30"/>
      - Margin=0,-10,0,20
  - target: Windows.UI.Xaml.Controls.Border#AppBorder
    styles:
      - Background:=$Background
      - BorderBrush:=$BorderBrush
      - BorderThickness=$BorderThickness
      - CornerRadius=$CornerRadius
  - target: StartMenu.SearchBoxToggleButton#SearchBoxToggleButton > Windows.UI.Xaml.Controls.Grid > Windows.UI.Xaml.Controls.Border#BorderElement
    styles:
      - BorderThickness=$ElementBorderThickness
      - BorderBrush:=$ElementBorderBrush
      - Background:=$ElementBG
      - CornerRadius=$CornerRadius
  - target: Cortana.UI.Views.RichSearchBoxControl#SearchBoxControl
    styles:
      - Width=Auto
      - RenderTransform:=<TranslateTransform X="0" />
  - target: Windows.UI.Xaml.Controls.Border#BorderElement
    styles:
      - Background=Transparent
      - BorderThickness=$BorderThickness
  - target: StartMenu.CategoryControl > Windows.UI.Xaml.Controls.Grid#RootGrid > Windows.UI.Xaml.Controls.Border 
    styles:
      - BorderThickness=$ElementBorderThickness
      - CornerRadius=$ElementCornerRadius
      - BorderBrush:=$ElementBorderBrush
      - Background:=$ElementBG
  - target: Windows.UI.Xaml.Controls.Border#BorderUnderline
    styles:
      - Visibility=Visible
  - target: StackPanel#TimeAndDatePanel
    styles:
      - VerticalAlignment=Top
      - HorizontalAlignment=Center
      - RenderTransform:=<TranslateTransform X="0" />
  - target: StackPanel#TimePanel > TextBlock#Time
    styles:
      - HorizontalAlignment=Center
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
      - FontFamily=vivo Sans Clock Stencil Regular
      - Foreground:=$ClockBG
      - Margin=0,50,0,0
      - VerticalAlignment=Center
  - target: StackPanel#TimeAndDatePanel > TextBlock#Date
    styles:
      - HorizontalAlignment=Center
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
      - FontFamily=vivo Sans EN VF
      - Foreground:=$ClockBG
      - Margin=0,-180,0,180
      - VerticalAlignment=Center
  - target: Windows.UI.Xaml.Controls.Grid#WidgetFrameGrid
    styles:
      - Background:=$Background
      - BorderBrush:=$BorderBrush
      - BorderThickness=$BorderThickness
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Grid#WidgetCanvasPanel
    styles:
      - HorizontalAlignment=Center
      - RenderTransform:=<TranslateTransform X="0" Y="50" />
  - target: Windows.UI.Xaml.Controls.Grid#MediaTransportControls
    styles:
      - Background:=$Background
      - BorderBrush:=$BorderBrush
      - BorderThickness=$BorderThickness
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Grid#MediaControlsContainer
    styles:
      - Visibility=Visible
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
      - Margin=0,-800,0,800
      - CornerRadius=$CornerRadius
      - VerticalAlignment=Center
      - HorizontalAlignment=Center
  - target: Windows.UI.Xaml.Controls.Border#BorderElement
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Primitives.ToggleButton#ShowHideCompanion
    styles:
      - RenderTransform:=<TranslateTransform X="-120" />
      - Visibility=Collapsed
  - target: Windows.UI.Xaml.Controls.Grid#CompanionRoot > Windows.UI.Xaml.Controls.Border#AcrylicOverlay
    styles:
      - BorderThickness=0
      - Visibility=Collapsed
  - target: Windows.UI.Xaml.Controls.Grid#Root > Windows.UI.Xaml.Controls.Border
    styles:
      - BorderBrush:=$BorderBrush
      - Background:=$Background
      - BorderThickness=$BorderThickness
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Border#StartDropShadow
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Border#RootGridDropShadow
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Border#RightCompanionDropShadow
    styles:
      - CornerRadius=$CornerRadius
      - Visibility=1
  - target: Windows.UI.Xaml.Controls.Grid#DroppedFlickerWorkaroundWrapper > Windows.UI.Xaml.Controls.Border#BackgroundBorder
    styles:
      - Background@PointerOver:=$Background
      - Background@Pressed:=$Background
      - Background@Selected:=$Background
  - target: Windows.UI.Xaml.Controls.Border#BackgroundBorder
    styles:
      - CornerRadius=10
  - target: Windows.UI.Xaml.Controls.Grid#ContentBorder
    styles:
      - CornerRadius=10
  - target: Windows.UI.Xaml.Controls.Border#LayerBorder
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Grid#OuterBorderGrid
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.Grid#MainMenu
    styles:
      - // Unused
  - target: Windows.UI.Xaml.PopupRoot
    styles:
      - CornerRadius=$CornerRadius
  - target: Windows.UI.Xaml.Controls.ContentPresenter#ZoomedInPresenter > Windows.UI.Xaml.Controls.GridView#AllAppsGrid > Windows.UI.Xaml.Controls.Border > Windows.UI.Xaml.Controls.ScrollViewer#ScrollViewer > Windows.UI.Xaml.Controls.Border#Root > Windows.UI.Xaml.Controls.Grid > Windows.UI.Xaml.Controls.ScrollContentPresenter#ScrollContentPresenter > Windows.UI.Xaml.Controls.ItemsPresenter > Windows.UI.Xaml.Controls.ItemsWrapGrid
    styles:
      - MaximumRowsOrColumns=2
      - Margin=5,-95,5,0
      - Width=Auto
      - MinWidth:=100
      - MaxWidth:=350
  - target: Windows.UI.Xaml.Controls.Grid#RightCompanionContainerGrid
    styles:
      - Visibility=Collapsed
  - target: StartMenu.PinnedList#StartMenuPinnedList
    styles:
      - Visibility=0
      - Margin=0,0,0,65
      - RenderTransform:=<TranslateTransform X="-0" Y="0" />
      - Height=Auto
      - MinHeight:=200
      - MaxHeight:=1000
  - target: Windows.UI.Xaml.Controls.TextBlock#PinnedListHeaderText
    styles:
      - Visibility=Collapsed
      - Margin=0,10,0,0
      - RenderTransform:=<TranslateTransform X="60" Y="-10" />
  - target: Microsoft.UI.Xaml.Controls.DropDownButton#ViewSelectionButton
    styles:
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
  - target: Windows.UI.Xaml.Controls.Grid#NavPanePlaceholder
    styles:
      - Width=Auto
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
      - Background:=$ElementBG
      - BorderBrush:=$ElementBorderBrush
      - CornerRadius:=$ElementCornerRadius
      - BorderThickness=$ElementBorderThickness
      - Height=70
      - Padding=5
      - Margin=0,-100,0,0
      - MaxWidth:=300
      - MinWidth=200
  - target: Windows.UI.Xaml.Controls.Primitives.ScrollBar#VerticalScrollBar
    styles:
      - RenderTransform:=<TranslateTransform X="0" Y="0" />
  - target: StartMenu.PinnedList#StartMenuPinnedList > Windows.UI.Xaml.Controls.Grid#Root > Windows.UI.Xaml.Controls.GridView#PinnedList > Windows.UI.Xaml.Controls.Border
    styles:
      - Background:=$ElementBG
      - BorderBrush:=$ElementBorderBrush
      - CornerRadius=$CornerRadius
      - BorderThickness=$ElementBorderThickness
      - Padding:=20,10,0,10
  - target: Windows.UI.Xaml.Controls.Grid#AllListHeading
    styles:
      - RenderTransform:=<TranslateTransform X="0" Y="-85" />
  - target: StartMenu.PinnedListTile > Windows.UI.Xaml.Controls.Grid#Root > Windows.UI.Xaml.Controls.Grid#DisplayNameAndDownloadIconContainer > Windows.UI.Xaml.Controls.TextBlock
    styles:
      - Visibility=0
  - target: StartMenu.StartHome
    styles:
      - Margin=0,0,0,60
      - Padding=0
  - target: StartMenu.StartMenuCompanion#RightCompanion > Windows.UI.Xaml.Controls.Grid#CompanionRoot > Windows.UI.Xaml.Controls.Border#AcrylicBorder
    styles:
      - Background:=$ElementBG
      - BorderBrush:=$ElementBorderBrush
      - BorderThickness=$ElementBorderThickness
      - CornerRadius=$ElementCornerRadius
  - target: Windows.UI.Xaml.Controls.Grid#TopLevelHeader > Windows.UI.Xaml.Controls.Grid > Windows.UI.Xaml.Controls.Button
    styles:
      - Visibility=1
  - target: Windows.UI.Xaml.Controls.MenuFlyoutPresenter > Windows.UI.Xaml.Controls.Border
    styles:
      - BorderBrush:=$BorderBrush
      - Background:=$Background
      - CornerRadius=15
      - BorderThickness=$BorderThickness
  - target: Windows.UI.Xaml.Controls.ToolTip > Windows.UI.Xaml.Controls.ContentPresenter#LayoutRoot
    styles:
      - Background:=$Background
      - BorderBrush:=$BorderBrush
      - BorderThickness=$BorderThickness
      - CornerRadius=15
  - target: Windows.UI.Xaml.Controls.Button#AddButton
    styles:
      - Background:=$Background
      - BorderBrush:=$BorderBrush
      - BorderThickness=$BorderThickness
      - CornerRadius=15
  - target: Windows.UI.Xaml.Controls.Grid#MainMenu
    styles:
      - MaxWidth:=400
  - target: Windows.UI.Xaml.Controls.GridView#PinnedList > Border > Windows.UI.Xaml.Controls.ScrollViewer
    styles:
      - ScrollViewer.VerticalScrollMode=2
      - MaxHeight:=336
      - MinHeight:=100
      - Height=Auto
  - target: StartMenu.CategoryControl
    styles:
      - MaxWidth:=200
      - MinWidth:=100
      - Width=Auto
      - Margin=10,40,-20,-40
  - target: Windows.UI.Xaml.Controls.GridViewHeaderItem > Windows.UI.Xaml.Controls.Border > Windows.UI.Xaml.Controls.ContentPresenter#ContentPresenter > Windows.UI.Xaml.Controls.Button#Header > Windows.UI.Xaml.Controls.Border#Border
    styles:
      - CornerRadius=10
  - target: StartMenu.FolderModal#StartFolderModal > Windows.UI.Xaml.Controls.Grid#Root
    styles:
      - MaxHeight:=400
      - MaxWidth:=400
      - Height=Auto
      - Width=Auto
  - target: StartMenu.FolderModal#StartFolderModal > Windows.UI.Xaml.Controls.Grid#Root > Windows.UI.Xaml.Controls.ContentControl#ContentControl > Windows.UI.Xaml.Controls.ContentPresenter > StartMenu.UniversalTileContainer#UniversalTileContainer > Windows.UI.Xaml.Controls.Grid#GridViewContainer
    styles:
      - Width=350
      - Height=350
  - target: StartMenu.SearchBoxToggleButton#SearchBoxToggleButton > Windows.UI.Xaml.Controls.Grid
    styles:
      - Background=Transparent
      - BorderThickness=0
      - CornerRadius=$CornerRadius
  - target: StartMenu.StartBlendedFlexFrame
    styles:
      - Width=480
  - target: Grid#TopLevelSuggestionsListHeader
    styles:
      - Margin=-5,-40,5,0
  - target: Windows.UI.Xaml.Controls.GridView#RecommendedList
    styles:
      - Margin=-5,-60,5,60
  - target: Button#ShowMoreSuggestionsButton
    styles:
      - Margin=-55,-64,55,64
  - target: Windows.UI.Xaml.Controls.GridView#RecommendedList > Border > Windows.UI.Xaml.Controls.ScrollViewer > Border > Grid > Windows.UI.Xaml.Controls.ScrollContentPresenter > Windows.UI.Xaml.Controls.ItemsPresenter > Windows.UI.Xaml.Controls.ItemsWrapGrid > Windows.UI.Xaml.Controls.GridViewItem
    styles:
      - MaxWidth=310
      - Width=310
  - target: Windows.UI.Xaml.Controls.MenuFlyoutItem
    styles:
      - CornerRadius=10
      - Margin=2,2,2,2
  - target: // Flyout submenu like More button
    styles:
      - ''
  - target: Windows.UI.Xaml.Controls.MenuFlyoutSubItem
    styles:
      - CornerRadius=10
      - Margin=2,2,2,2
  - target: Windows.UI.Xaml.Controls.Grid#AllListHeading > Microsoft.UI.Xaml.Controls.DropDownButton#ViewSelectionButton > Grid#RootGrid
    styles:
      - CornerRadius=10
  - target: Windows.UI.Xaml.Controls.ToggleMenuFlyoutItem
    styles:
      - CornerRadius=10
# 1. The Outer Flyout (Add negative padding to cleanup the UI)
  - target: Windows.UI.Xaml.Controls.FlyoutPresenter
    styles:
      - BorderBrush:=$BorderBrush
      - BorderThickness:=$BorderThickness
      - CornerRadius:=$ElementCornerRadius
      - Padding:=-1